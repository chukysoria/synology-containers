---
services:
  # Prometheus - Metrics collection and storage
  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    container_name: prometheus
    restart: unless-stopped
    networks:
      - frontend
      - monitoring-net
    security_opt:
      - no-new-privileges:true
    user: ${PUID:-1029}:${PGID:-65536}
    volumes:
      - ${BASE_PATH:-/volume2/docker/}prometheus/data:/prometheus:rw
      - ${BASE_PATH:-/volume2/docker/}prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1m
    labels:
      traefik.enable: true
      traefik.http.routers.prometheus-rtr.rule: Host(`prometheus.${DOMAIN:-boulebar.duckdns.org}`)
      traefik.http.routers.prometheus-rtr.entrypoints: websecure
      traefik.http.routers.prometheus-rtr.middlewares: authentik@docker
      traefik.http.services.prometheus-svc.loadbalancer.server.port: 9090

  # cAdvisor - Container metrics (optimized for Synology)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    container_name: cadvisor
    restart: unless-stopped
    networks:
      - monitoring-net
    security_opt:
      - no-new-privileges:true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
    environment:
      TZ: ${TZ:-Europe/Madrid}
    command:
      - '--profiling=false'
      - '--docker_only=true'
      - '--housekeeping_interval=30s'
      - '--disable_metrics=advtcp,cpu_topology,disk,memory_numa,process'
      - '--store_container_labels=false'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1m

  # Node Exporter - Host system metrics
  node-exporter:
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - monitoring-net
    security_opt:
      - no-new-privileges:true
    user: ${PUID:-1029}:${PGID:-65536}
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.netdev.device-exclude=^docker[0-9a-f]+$$'
    environment:
      TZ: ${TZ:-Europe/Madrid}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9100/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1m

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    container_name: grafana
    networks:
      - frontend
      - grafana-db-net
      - monitoring-net
    security_opt:
      - no-new-privileges:true
    user: ${PUID:-1029}:${PGID:-65536}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3m
      # start_interval: 5s
    volumes:
      - ${BASE_PATH:-/volume2/docker/}grafana/data:/var/lib/grafana:rw
      - ${BASE_PATH:-/volume2/docker/}grafana/grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    environment:
      TZ: ${TZ:-Europe/Madrid}
      # Grafana
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN:-boulebar.duckdns.org}/
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource,natel-discrete-panel,grafana-piechart-panel
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "authentik"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${GRAFANA_OAUTH_CLIENT_ID:?OAuth Client ID}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OAUTH_CLIENT_SECRET:?OAuth Client Secret}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://authentik.${DOMAIN:-boulebar.duckdns.org}/application/o/authorize/"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://authentik.${DOMAIN:-boulebar.duckdns.org}/application/o/token/"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://authentik.${DOMAIN:-boulebar.duckdns.org}/application/o/userinfo/"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "https://authentik.${DOMAIN:-boulebar.duckdns.org}/application/o/grafana/end-session/"
      # Optionally enable auto-login (bypasses Grafana login screen)
      GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      # Optionally map user groups to Grafana roles
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups, 'grafana_admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'"
    restart: unless-stopped
    labels:
      traefik.enable: true
      traefik.http.routers.grafana-rtr.rule: Host(`grafana.${DOMAIN:-boulebar.duckdns.org}`)

networks:
  frontend:
    external: true # Defined in portainer
  grafana-db-net:
    external: true # Defined in Database
  monitoring-net:
    external: false # Local network for monitoring stack
