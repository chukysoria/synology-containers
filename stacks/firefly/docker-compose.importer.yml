services:
  importer:
    image: fireflyiii/data-importer:version-2.3.3@sha256:376b52a3abc92ea459b9b77c7be594e5abf9c845e80eccbbe6bda0af67859c31
    hostname: importer
    restart: always
    container_name: firefly_iii_importer
    env_file:
      - ../../stack.env
    networks:
      - firefly-net
      - firefly-frontend-net
      - firefly-db-net
    volumes:
      - ${BASE_PATH:-/volume2/docker/}firefly/import:/import:rw
      - firefly_iii_import_upload:/var/www/html/storage/upload:rw
    labels:
      traefik.enable: true
      traefik.docker.network: firefly-frontend-net
      traefik.http.routers.firefly-importer-rtr.rule: Host(`ffimporter.${DOMAIN:-boulebar.duckdns.org}`)
      traefik.http.routers.firefly-importer-rtr.middlewares: authentik@docker

volumes:
  firefly_iii_import_upload:

networks:
  firefly-net:
    external: true # Defined in base
  firefly-frontend-net:
    external: true # Defined in base
  firefly-db-net:
    external: true # Defined in base
